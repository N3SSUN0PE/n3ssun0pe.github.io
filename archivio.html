<script>
        const searchWrapper = document.getElementById('containerRicerca');
        const searchInput = document.getElementById('barraRicerca');

        function toggleRicerca() {
            searchWrapper.classList.toggle('expanded');
            if (searchWrapper.classList.contains('expanded')) {
                searchInput.focus();
            } else {
                pulisciRicerca();
            }
        }

        function pulisciRicerca() {
            searchInput.value = ''; 
            filtraLog(); // Rimostra tutti i log
        }

        function filtraLog() {
            let inputLower = searchInput.value.toLowerCase();
            let cards = document.querySelectorAll('.log-card');

            cards.forEach(card => {
                let testo = card.textContent || card.innerText;
                if (testo.toLowerCase().indexOf(inputLower) > -1) {
                    card.style.display = "flex"; // "flex" per mantenere l'allineamento delle icone
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Chiude la barra se clicchi fuori
        document.addEventListener('click', function(event) {
            if (searchWrapper.classList.contains('expanded') && !searchWrapper.contains(event.target)) {
                searchWrapper.classList.remove('expanded');
                pulisciRicerca();
            }
        });
    </script>
